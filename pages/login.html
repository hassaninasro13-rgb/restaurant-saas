<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="supabase-env.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneTap Menu — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="../css/shared.css">
<style>
  body {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  /* LEFT PANEL */
  .auth-visual {
    position: relative;
    overflow: hidden;
    color: #fff;
    padding: 34px;
    background:
      linear-gradient(rgba(26,18,8,.72), rgba(26,18,8,.82)),
      url("https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=800&q=80") center/cover no-repeat;
  }
  .logo {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-family: "Playfair Display", serif;
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: .2px;
  }
  .dot {
    width: 11px;
    height: 11px;
    border-radius: 999px;
    background: #E84B2A;
    box-shadow: 0 0 0 5px rgba(232,75,42,.2);
  }
  .auth-visual h1 {
    margin: 68px 0 12px;
    font-family: "Playfair Display", serif;
    font-size: clamp(2rem, 3vw, 2.7rem);
    line-height: 1.15;
    letter-spacing: .1px;
    max-width: 420px;
  }
  .auth-visual .ar-sub {
    margin: 0 0 20px;
    direction: rtl;
    text-align: right;
    color: rgba(255,255,255,.86);
    font-size: .95rem;
    max-width: 420px;
  }
  .qr-card {
    width: 176px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,.36);
    background: rgba(255,255,255,.14);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 12px;
    position: relative;
    overflow: hidden;
    animation: floatY 3.5s ease-in-out infinite, glowPulse 2.4s ease-in-out infinite;
    box-shadow: 0 14px 28px rgba(0,0,0,.22), 0 0 0 1px rgba(232,75,42,.22) inset;
  }
  .scan-icon {
    width: 28px;
    height: 28px;
    margin: 0 auto 8px;
    display: block;
    color: #ffd9cf;
    opacity: .95;
    animation: iconPulse 1.7s ease-in-out infinite;
  }
  .qr-box {
    position: relative;
    border-radius: 12px;
    background: rgba(255,255,255,.92);
    padding: 8px;
    border: 1px solid rgba(255,255,255,.72);
  }
  .qr-svg {
    width: 100%;
    aspect-ratio: 1 / 1;
    display: block;
    border-radius: 8px;
    background: #fff;
  }
  .scan-line {
    position: absolute;
    left: 10px;
    right: 10px;
    top: 10px;
    height: 2px;
    border-radius: 999px;
    background: linear-gradient(90deg, transparent, rgba(232,75,42,.9), transparent);
    box-shadow: 0 0 10px rgba(232,75,42,.65);
    animation: scanBeam 2.4s linear infinite;
    pointer-events: none;
  }
  .stats {
    margin-top: 18px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .stat {
    min-width: 90px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.22);
    background: rgba(255,255,255,.08);
    padding: 10px 10px 8px;
    text-align: center;
  }
  .stat strong {
    display: block;
    font-size: 1.12rem;
    line-height: 1.1;
  }
  .stat small {
    display: block;
    margin-top: 3px;
    font-size: .68rem;
    color: rgba(255,255,255,.8);
  }
  @keyframes floatY {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  @keyframes glowPulse {
    0%,100% { box-shadow: 0 14px 28px rgba(0,0,0,.22), 0 0 0 1px rgba(232,75,42,.22) inset, 0 0 0 rgba(232,75,42,0); }
    50% { box-shadow: 0 16px 32px rgba(0,0,0,.24), 0 0 0 1px rgba(232,75,42,.45) inset, 0 0 20px rgba(232,75,42,.28); }
  }
  @keyframes scanBeam {
    0% { transform: translateY(0); opacity: .1; }
    15% { opacity: 1; }
    85% { opacity: 1; }
    100% { transform: translateY(calc(100% + 116px)); opacity: .1; }
  }
  @keyframes iconPulse {
    0%,100% { transform: scale(1); opacity: .9; }
    50% { transform: scale(1.08); opacity: 1; }
  }
  .auth-visual-footer {
    color: rgba(255,255,255,.25);
    font-size: .75rem;
  }
  .auth-visual-headline {
    font-family: "Playfair Display", serif;
    font-size: 2.4rem;
    font-weight: 800;
    color: #fff;
    line-height: 1.15;
    margin-bottom: 20px;
  }
  .auth-visual-headline em {
    color: var(--accent);
    font-style: normal;
  }
  .auth-feature-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    list-style: none;
  }
  .auth-feature-list li {
    display: flex;
    align-items: center;
    gap: 10px;
    color: rgba(255,255,255,.6);
    font-size: .88rem;
  }
  .auth-feature-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }
  .auth-visual-footer {
    color: rgba(255,255,255,.25);
    font-size: .75rem;
    position: relative;
    z-index: 1;
  }

  /* RIGHT PANEL */
  .auth-form-panel {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 40px;
    background: var(--cream);
  }
  .auth-form-container {
    width: 100%;
    max-width: 400px;
  }
  .auth-form-title {
    font-family: var(--font-display);
    font-size: 1.8rem;
    font-weight: 800;
    margin-bottom: 6px;
  }
  .auth-form-sub {
    color: var(--ink2);
    font-size: .88rem;
    margin-bottom: 32px;
  }
  .auth-tabs {
    display: flex;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    background: #fff;
    margin-bottom: 28px;
    gap: 4px;
  }
  .auth-tab {
    flex: 1;
    padding: 9px;
    border-radius: 7px;
    border: none;
    background: transparent;
    font-family: var(--font-body);
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    color: var(--ink3);
    transition: all .15s;
  }
  .auth-tab.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 8px rgba(var(--accent-rgb), .3);
  }
  .auth-footer-link {
    text-align: center;
    margin-top: 20px;
    font-size: .83rem;
    color: var(--ink3);
  }
  .auth-footer-link a {
    color: var(--accent);
    font-weight: 600;
    cursor: pointer;
  }

  @media (max-width: 800px) {
    body { grid-template-columns: 1fr; }
    .auth-visual { display: none; }
    .auth-form-panel { padding: 32px 20px; }
  }
</style>
</head>
<body>

<!-- LEFT VISUAL -->
<aside class="auth-visual">
  <div class="logo"><span class="dot"></span>OneTap Menu</div>
  <h1>Votre menu, scanné en une seconde.</h1>
  <p class="ar-sub">قائمتك، بمسح واحد من الهاتف</p>
  <div class="qr-card">
    <svg class="scan-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M4 7V5a1 1 0 0 1 1-1h2M20 7V5a1 1 0 0 0-1-1h-2M4 17v2a1 1 0 0 0 1 1h2M20 17v2a1 1 0 0 1-1 1h-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M8 12h8M10 9.5h4M10 14.5h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
    <div class="qr-box">
      <svg class="qr-svg" viewBox="0 0 84 84" xmlns="http://www.w3.org/2000/svg" aria-label="QR code">
        <rect width="84" height="84" fill="#fff"/>
        <rect x="4" y="4" width="20" height="20" rx="2" fill="#E84B2A"/>
        <rect x="8" y="8" width="12" height="12" rx="1" fill="#111"/>
        <rect x="60" y="4" width="20" height="20" rx="2" fill="#E84B2A"/>
        <rect x="64" y="8" width="12" height="12" rx="1" fill="#111"/>
        <rect x="4" y="60" width="20" height="20" rx="2" fill="#E84B2A"/>
        <rect x="8" y="64" width="12" height="12" rx="1" fill="#111"/>
        <rect x="30" y="6" width="4" height="4" fill="#111"/>
        <rect x="38" y="6" width="4" height="4" fill="#111"/>
        <rect x="46" y="6" width="4" height="4" fill="#111"/>
        <rect x="30" y="14" width="4" height="4" fill="#111"/>
        <rect x="46" y="14" width="4" height="4" fill="#111"/>
        <rect x="30" y="22" width="4" height="4" fill="#111"/>
        <rect x="38" y="22" width="4" height="4" fill="#111"/>
        <rect x="46" y="22" width="4" height="4" fill="#111"/>
        <rect x="28" y="34" width="4" height="4" fill="#111"/>
        <rect x="36" y="34" width="4" height="4" fill="#111"/>
        <rect x="44" y="34" width="4" height="4" fill="#111"/>
        <rect x="52" y="34" width="4" height="4" fill="#111"/>
        <rect x="60" y="34" width="4" height="4" fill="#111"/>
        <rect x="30" y="42" width="4" height="4" fill="#111"/>
        <rect x="38" y="42" width="4" height="4" fill="#111"/>
        <rect x="46" y="42" width="4" height="4" fill="#111"/>
        <rect x="54" y="42" width="4" height="4" fill="#111"/>
        <rect x="62" y="42" width="4" height="4" fill="#111"/>
        <rect x="22" y="50" width="4" height="4" fill="#111"/>
        <rect x="30" y="50" width="4" height="4" fill="#111"/>
        <rect x="38" y="50" width="4" height="4" fill="#111"/>
        <rect x="46" y="50" width="4" height="4" fill="#111"/>
        <rect x="54" y="50" width="4" height="4" fill="#111"/>
        <rect x="62" y="50" width="4" height="4" fill="#111"/>
        <rect x="22" y="58" width="4" height="4" fill="#111"/>
        <rect x="30" y="58" width="4" height="4" fill="#111"/>
        <rect x="46" y="58" width="4" height="4" fill="#111"/>
        <rect x="54" y="58" width="4" height="4" fill="#111"/>
        <rect x="62" y="58" width="4" height="4" fill="#111"/>
        <rect x="30" y="66" width="4" height="4" fill="#111"/>
        <rect x="38" y="66" width="4" height="4" fill="#111"/>
        <rect x="46" y="66" width="4" height="4" fill="#111"/>
        <rect x="54" y="66" width="4" height="4" fill="#111"/>
        <rect x="62" y="66" width="4" height="4" fill="#111"/>
      </svg>
      <div class="scan-line"></div>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><strong>2min</strong><small>setup</small></div>
    <div class="stat"><strong>500+</strong><small>commerces</small></div>
    <div class="stat"><strong>100%</strong><small>free</small></div>
  </div>
  <div class="auth-visual-footer">© 2026 OneTap Menu — Made in Algeria 🇩🇿</div>
</aside>

<!-- RIGHT FORM -->
<main class="auth-form-panel">
  <div class="auth-form-container">
    <h1 class="auth-form-title">Bienvenue</h1>
    <p class="auth-form-sub">Connectez-vous ou créez votre compte gratuitement</p>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="showTab('login')">Connexion</button>
      <button class="auth-tab" id="tab-register" onclick="showTab('register')">Inscription</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="form-login">
      <div id="login-alert"></div>
      <div class="field">
        <label for="login-email">Adresse email</label>
        <input type="email" id="login-email" class="input" placeholder="vous@exemple.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="login-password">Mot de passe</label>
        <input type="password" id="login-password" class="input" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-full btn-lg" id="btn-login" onclick="handleLogin()">
        Se connecter
      </button>
    </div>

    <!-- REGISTER FORM -->
    <div id="form-register" style="display:none">
      <div id="register-alert"></div>
      <div class="field">
        <label for="reg-email">Adresse email</label>
        <input type="email" id="reg-email" class="input" placeholder="vous@exemple.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="reg-password">Mot de passe</label>
        <input type="password" id="reg-password" class="input" placeholder="Minimum 8 caractères" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="reg-password2">Confirmer le mot de passe</label>
        <input type="password" id="reg-password2" class="input" placeholder="••••••••">
      </div>
      <button class="btn btn-primary btn-full btn-lg" id="btn-register" onclick="handleRegister()">
        Créer mon compte
      </button>
      <p style="font-size:.8rem;color:var(--ink3);text-align:center;margin-top:14px;">
        En créant un compte, vous acceptez nos conditions d'utilisation.
      </p>
    </div>

  </div>
</main>

<script type="module">
import { supabase, getLang, setLang } from '../js/shared.js';
import { checkIsPlatformAdmin } from '../supabase/subscriptions.js';
import { isSupabaseConfigured } from '../supabase/config.js';
import { getMyRestaurantAccess, getRoleHomePath } from '../supabase/restaurant-users.js';

setLang(getLang());

window.showTab = function(tab) {
  document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
};

function setAlert(id, html, type = 'error') {
  document.getElementById(id).innerHTML = html
    ? `<div class="alert alert-${type}">${html}</div>` : '';
}

function gateSupabaseUi() {
  if (isSupabaseConfigured()) return;
  const msg =
    'Supabase n’est pas configuré : pages/supabase-env.js ne contient pas vos clés (build manquant). Sur Vercel : Project → Settings → Environment Variables → VITE_SUPABASE_URL et VITE_SUPABASE_ANON_KEY (Production et Aperçu), puis Redeploy. En local : .env à la racine puis npm run build.';
  setAlert('login-alert', msg);
  setAlert('register-alert', msg);
  document.getElementById('btn-login').disabled = true;
  document.getElementById('btn-register').disabled = true;
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading
    ? '<span class="spinner"></span>'
    : (btnId === 'btn-login' ? 'Se connecter' : 'Créer mon compte');
}

window.handleLogin = async function() {
  if (!isSupabaseConfigured()) {
    setAlert('login-alert', 'Supabase n’est pas configuré. Voir le message ci-dessus ou le README.');
    return;
  }
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { setAlert('login-alert', 'Veuillez remplir tous les champs.'); return; }

  setLoading('btn-login', true);
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  setLoading('btn-login', false);

  if (error) {
    const m = String(error.message || '');
    if (/failed to fetch|networkerror|load failed/i.test(m)) {
      setAlert(
        'login-alert',
        'Impossible de joindre Supabase (réseau ou URL). Vérifiez : 1) Projet Supabase actif (Dashboard → pas « paused »). 2) Authentication → URL configuration : Site URL = votre domaine Vercel ; Redirect URLs incluent https://…/pages/login.html. 3) Redeploy après variables d’environnement.',
      );
    } else {
      setAlert('login-alert', m);
    }
    return;
  }

  if (await checkIsPlatformAdmin()) {
    window.location.href = 'admin.html';
    return;
  }

  const { data: access } = await getMyRestaurantAccess(data.user);
  window.location.href = access ? getRoleHomePath(access.role) : 'create-restaurant.html';
};

window.handleRegister = async function() {
  if (!isSupabaseConfigured()) {
    setAlert('register-alert', 'Supabase n’est pas configuré. Voir le message ci-dessus ou le README.');
    return;
  }
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const password2 = document.getElementById('reg-password2').value;

  if (!email || !password) { setAlert('register-alert', 'Veuillez remplir tous les champs.'); return; }
  if (password.length < 8) { setAlert('register-alert', 'Le mot de passe doit contenir au moins 8 caractères.'); return; }
  if (password !== password2) { setAlert('register-alert', 'Les mots de passe ne correspondent pas.'); return; }

  const emailRedirectTo = new URL('login.html', window.location.href).href;
  setLoading('btn-register', true);
  const { error } = await supabase.auth.signUp({
    email,
    password,
    options: { emailRedirectTo },
  });
  setLoading('btn-register', false);

  if (error) {
    const m = String(error.message || '');
    if (/failed to fetch|networkerror|load failed/i.test(m)) {
      setAlert(
        'register-alert',
        'Impossible de joindre Supabase. Vérifiez l’URL du projet, le projet non suspendu, et Supabase → Authentication → URL configuration pour votre domaine.',
      );
    } else {
      setAlert('register-alert', m);
    }
    return;
  }

  setAlert('register-alert', 'Compte créé ! Vérifiez votre email puis connectez-vous.', 'success');
  setTimeout(() => showTab('login'), 2000);
};

gateSupabaseUi();

// Check if already logged in
(async () => {
  if (!isSupabaseConfigured()) return;
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) return;
  if (await checkIsPlatformAdmin()) {
    window.location.href = 'admin.html';
    return;
  }
  const { data: access } = await getMyRestaurantAccess(session.user);
  window.location.href = access ? getRoleHomePath(access.role) : 'create-restaurant.html';
})();

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const loginVisible = document.getElementById('form-login').style.display !== 'none';
    if (loginVisible) handleLogin(); else handleRegister();
  }
});
</script>
</body>
</html>
