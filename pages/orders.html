<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<script src="supabase-env.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneTap Menu — Commandes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="../css/shared.css">
<link rel="stylesheet" href="../css/dashboard.css">
<style>
  .orders-toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .status-filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }
  .sf-btn {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    font-size: .8rem;
    font-weight: 600;
    cursor: pointer;
    background: #fff;
    color: var(--ink2);
    transition: all .12s;
  }
  .sf-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .sf-btn:hover:not(.active) { border-color: var(--ink); }

  .orders-search {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 14px;
    min-width: 220px;
  }
  .orders-search input {
    border: none;
    outline: none;
    font-size: .88rem;
    color: var(--ink);
    background: transparent;
    width: 100%;
  }
  .orders-search input::placeholder { color: var(--ink3); }

  /* Order cards */
  .order-card-full {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 10px;
    transition: box-shadow .12s;
  }
  .order-card-full:hover { box-shadow: var(--shadow); }

  .order-card-header {
    display: grid;
    grid-template-columns: 130px 1fr 140px 100px minmax(200px, 1.2fr);
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
  }
  .order-card-header:hover { background: var(--cream); }

  .order-num-tag {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 1rem;
    color: var(--accent);
  }
  .order-date { font-size: .75rem; color: var(--ink3); margin-top: 2px; }
  .order-customer-name { font-weight: 600; font-size: .93rem; }
  .order-customer-phone { font-size: .78rem; color: var(--ink3); }
  .order-total {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1rem;
  }
  .order-type-tag { font-size: .8rem; color: var(--ink3); margin-top: 3px; }

  .order-source-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 6px;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: .72rem;
    font-weight: 700;
    background: var(--accent-lt);
    color: var(--accent);
    width: fit-content;
    max-width: 100%;
  }

  .order-status-select {
    padding: 7px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: .82rem;
    font-weight: 600;
    cursor: pointer;
    background: #fff;
    outline: none;
    width: 100%;
    transition: border-color .12s;
  }
  .order-status-select:focus { border-color: var(--accent); }

  .order-flow-actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    justify-content: flex-end;
  }
  .order-flow-btn {
    padding: 8px 14px;
    border-radius: 999px;
    border: 1.5px solid var(--border);
    font-size: .76rem;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--font-body);
    background: #fff;
    color: var(--ink2);
    transition: background .12s, border-color .12s, color .12s;
    white-space: nowrap;
  }
  .order-flow-btn:hover { border-color: var(--ink2); color: var(--ink); }
  .order-flow-btn--primary {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }
  .order-flow-btn--primary:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .order-flow-btn--danger {
    border-color: var(--red-lt);
    color: var(--red);
    background: var(--red-lt);
  }
  .order-flow-btn--danger:hover { background: var(--red); color: #fff; border-color: var(--red); }
  .order-flow-muted { font-size: .78rem; color: var(--ink3); font-weight: 600; }

  .order-card-full.order-card--st-new { border-left: 4px solid var(--blue); }
  .order-card-full.order-card--st-preparing,
  .order-card-full.order-card--st-confirmed { border-left: 4px solid var(--amber); }
  .order-card-full.order-card--st-ready { border-left: 4px solid var(--green); }
  .order-card-full.order-card--st-completed,
  .order-card-full.order-card--st-done,
  .order-card-full.order-card--st-delivered { border-left: 4px solid var(--ink3); }
  .order-card-full.order-card--st-cancelled { border-left: 4px solid var(--red); }

  .order-expand-btn {
    background: var(--cream2);
    border: none;
    border-radius: 6px;
    width: 28px; height: 28px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    transition: all .15s;
    justify-self: end;
  }
  .order-expand-btn:hover { background: var(--cream3); }

  .order-detail-panel {
    border-top: 1.5px solid var(--border);
    padding: 20px 24px;
    display: none;
    background: var(--cream);
  }
  .order-detail-panel.open { display: block; }

  .order-items-table {
    background: #fff;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .oi-row {
    display: grid;
    grid-template-columns: 1fr 80px 80px 90px;
    gap: 8px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: .88rem;
    align-items: center;
  }
  .oi-row:last-child { border-bottom: none; }
  .oi-row.header {
    background: var(--cream2);
    font-size: .72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--ink3);
  }
  .oi-total { font-weight: 700; text-align: right; }

  .order-info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 16px;
  }
  .order-info-box {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
  }
  .order-info-label {
    font-size: .72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--ink3);
    margin-bottom: 4px;
  }
  .order-info-value { font-size: .9rem; font-weight: 500; }

  .order-wa-btn {
    background: #25D366;
    color: #fff;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 16px;
    border-radius: var(--radius);
    font-size: .85rem;
    font-weight: 600;
    text-decoration: none;
    transition: background .15s;
  }
  .order-wa-btn:hover { background: #1EB857; }

  .order-total-summary {
    display: flex;
    gap: 16px;
    align-items: center;
    justify-content: flex-end;
    padding: 12px 16px;
    background: #fff;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    font-size: .9rem;
  }
  .order-total-summary strong { font-family: var(--font-display); font-size: 1.1rem; }

  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    animation: pulse 2s infinite;
    margin-right: 4px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }

  @media (max-width: 900px) {
    .order-card-header { grid-template-columns: 1fr 1fr; }
    .order-info-grid { grid-template-columns: 1fr 1fr; }
    .oi-row { grid-template-columns: 1fr 60px 70px; }
  }
</style>
</head>

<script type="module">
import { requireAuth, signOut, syncAuthContext } from '../supabase/auth.js';
import { getRestaurantById } from '../supabase/restaurants.js';
import {
  hideLoader,
  fmtCurrency,
  fmtDate,
  getStatusBadge,
  toast,
  formatOrderSourceForDisplay,
  getRestaurantCurrency,
  getRestaurantLocale,
  applyStaffShellBranding,
  t,
  hydrateI18n,
} from '../js/shared.js';
import { listOrdersWithItems, updateOrderStatus } from '../supabase/orders.js';
import {
  getMyRestaurantAccess,
  getRoleHomePath,
  isRestaurantRoleAllowed,
} from '../supabase/restaurant-users.js';

let restaurant = null;
let allOrders = [];
let currentStatus = 'all';
let searchQuery = '';
let refreshInterval = null;

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/"/g, '&quot;');
}

(async () => {
  const session = await requireAuth();
  if (!session) return;
  const { data: access } = await getMyRestaurantAccess(session.user);
  if (!access?.restaurant_id) { window.location.href = 'create-restaurant.html'; return; }
  if (!isRestaurantRoleAllowed(access.role, ['owner', 'admin', 'staff'])) {
    window.location.href = getRoleHomePath(access.role);
    return;
  }
  await syncAuthContext(session.user.id);
  const { data: rest } = await getRestaurantById(access.restaurant_id);
  if (!rest) { window.location.href = 'create-restaurant.html'; return; }
  restaurant = rest;
  applyStaffShellBranding(rest);
  hydrateI18n(document);
  document.getElementById('sb-rest-name').textContent = rest.name;
  await loadOrders();
  hideLoader();

  // Auto-refresh every 30 seconds
  refreshInterval = setInterval(loadOrders, 30000);
})();

window.loadOrders = async function() {
  const { data } = await listOrdersWithItems(restaurant.id, 200);

  allOrders = data || [];
  updateStats();
  renderOrders();
};

function updateStats() {
  const thirtyDaysAgo = new Date(Date.now() - 30*24*60*60*1000).toISOString();
  const recent = allOrders.filter(o => o.created_at >= thirtyDaysAgo);

  document.getElementById('s-new').textContent = allOrders.filter(o => o.status === 'new').length;
  document.getElementById('s-preparing').textContent = allOrders.filter(o => o.status === 'preparing').length;
  document.getElementById('s-ready').textContent = allOrders.filter(o => o.status === 'ready').length;
  const doneLike = (s) => ['completed', 'done', 'delivered'].includes(s);
  document.getElementById('s-done').textContent = recent.filter(o => doneLike(o.status)).length;
  const revenue = recent.filter(o => doneLike(o.status)).reduce((s, o) => s + (o.total_amount || 0), 0);
  document.getElementById('s-revenue').textContent = fmtCurrency(
    revenue,
    getRestaurantCurrency(restaurant),
    getRestaurantLocale(restaurant),
  );
}

function getFiltered() {
  let filtered = allOrders;
  if (currentStatus !== 'all') {
    filtered = allOrders.filter((o) => {
      const s = o.status;
      if (currentStatus === 'preparing') return s === 'preparing' || s === 'confirmed';
      if (currentStatus === 'completed') return s === 'completed' || s === 'done' || s === 'delivered';
      return s === currentStatus;
    });
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(o =>
      o.customer_name?.toLowerCase().includes(q) ||
      o.customer_phone?.includes(q) ||
      o.order_number?.toLowerCase().includes(q) ||
      o.source_name?.toLowerCase().includes(q) ||
      o.source_type?.toLowerCase().includes(q) ||
      o.table_name?.toLowerCase().includes(q) ||
      String(o.table_number || '').toLowerCase().includes(q)
    );
  }
  return filtered;
}

/** Map legacy rows to a card accent class (confirmed → preparing lane). */
function orderCardStatusClass(status) {
  if (status === 'done' || status === 'delivered') return 'completed';
  if (status === 'confirmed') return 'preparing';
  return status || 'unknown';
}

/** Effective step for workflow buttons (legacy → current model). */
function effectiveWorkflowStep(status) {
  if (status === 'done' || status === 'delivered') return 'completed';
  if (status === 'confirmed' || status === 'preparing') return 'preparing';
  return status;
}

function buildStatusActionButtons(o) {
  const s = o.status;
  if (s === 'cancelled') {
    return `<span class="order-flow-muted">${esc(t('ord.flowCancelled'))}</span>`;
  }
  const step = effectiveWorkflowStep(s);
  if (step === 'completed') {
    return `<span class="order-flow-muted">${esc(t('ord.flowDone'))}</span>`;
  }
  const id = o.id;
  const parts = [];
  if (step === 'new') {
    parts.push(
      `<button type="button" class="order-flow-btn order-flow-btn--primary" onclick="event.stopPropagation(); updateStatus('${id}', 'preparing')">${esc(t('ord.btnToPreparing'))}</button>`,
    );
  } else if (step === 'preparing') {
    parts.push(
      `<button type="button" class="order-flow-btn order-flow-btn--primary" onclick="event.stopPropagation(); updateStatus('${id}', 'ready')">${esc(t('ord.btnToReady'))}</button>`,
    );
  } else if (step === 'ready') {
    parts.push(
      `<button type="button" class="order-flow-btn order-flow-btn--primary" onclick="event.stopPropagation(); updateStatus('${id}', 'completed')">${esc(t('ord.btnToCompleted'))}</button>`,
    );
  }
  parts.push(
    `<button type="button" class="order-flow-btn order-flow-btn--danger" onclick="event.stopPropagation(); updateStatus('${id}', 'cancelled')">${esc(t('ord.btnCancel'))}</button>`,
  );
  return `<div class="order-flow-actions">${parts.join('')}</div>`;
}

function renderOrders() {
  const filtered = getFiltered();
  document.getElementById('orders-count-tag').textContent =
    filtered.length === 1 ? t('ord.orderCount', { n: filtered.length }) : t('ord.orderCountPlural', { n: filtered.length });

  const container = document.getElementById('orders-container');
  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon" style="font-size:2rem">📋</div>
        <h3>${esc(t('ord.emptyTitle'))}</h3>
        <p>${esc(currentStatus === 'all' ? t('ord.emptyAll') : t('ord.emptyFilter'))}</p>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(o => buildOrderCard(o)).join('');
}

const ORDER_CARD_STATUS_OPTIONS = ['new','preparing','ready','completed','cancelled','confirmed','done','delivered'];

function orderTypeLabel(type) {
  const m = {
    delivery: 'ord.orderTypeDelivery',
    pickup: 'ord.orderTypePickup',
    dine_in: 'ord.orderTypeDineIn',
    qr_table: 'ord.orderTypeQrTable',
  };
  const key = m[type];
  return key ? t(key) : type;
}

function buildOrderCard(o) {
  const items = o.order_items || [];
  const loc = getRestaurantLocale(restaurant);
  const sourceDisplayLine = formatOrderSourceForDisplay(o);
  const sourcePill = sourceDisplayLine
    ? `<div class="order-source-pill" title="${esc(t('ord.sourcePillTitle'))}">${esc(sourceDisplayLine)}</div>`
    : '';

  const waMsg = encodeURIComponent(
    t('ord.waConfirmMsg', { num: o.order_number, name: o.customer_name || '' }),
  );
  const waLink = `https://wa.me/${o.customer_phone?.replace(/\D/g,'')}?text=${waMsg}`;

  const stClass = orderCardStatusClass(o.status);
  const typeLine = orderTypeLabel(o.order_type);
  return `
  <div class="order-card-full order-card--st-${stClass}" id="order-${o.id}">
    <div class="order-card-header" onclick="toggleOrder('${o.id}')">
      <div>
        <div class="order-num-tag">${o.order_number}</div>
        ${sourcePill}
        <div class="order-date">${fmtDate(o.created_at, loc)}</div>
      </div>
      <div>
        <div class="order-customer-name">${esc(o.customer_name)}</div>
        <div class="order-customer-phone">${esc(o.customer_phone || '—')}</div>
      </div>
      <div>
        <div class="order-total">${fmtCurrency(o.total_amount, getRestaurantCurrency(restaurant), loc)}</div>
        <div class="order-type-tag">${esc(typeLine)}</div>
      </div>
      <div>${getStatusBadge(o.status)}</div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
        ${buildStatusActionButtons(o)}
        <select class="order-status-select" title="${esc(t('ord.statusSelectTitle'))}" onchange="updateStatus('${o.id}', this.value)" onclick="event.stopPropagation()">
          ${ORDER_CARD_STATUS_OPTIONS.map(s =>
            `<option value="${s}" ${o.status === s ? 'selected' : ''}>${esc(t('status.' + s))}</option>`
          ).join('')}
        </select>
        <button type="button" class="order-expand-btn" aria-label="${esc(t('ord.detailsAria'))}">▾</button>
      </div>
    </div>

    <div class="order-detail-panel" id="detail-${o.id}">
      <div class="order-info-grid">
        <div class="order-info-box">
          <div class="order-info-label">${esc(t('ord.customerBlockTitle'))}</div>
          <div class="order-info-value">${esc(o.customer_name)}</div>
          <div style="font-size:.8rem;color:var(--ink3)">${esc(o.customer_phone || '—')}</div>
          ${o.customer_email ? `<div style="font-size:.8rem;color:var(--ink3)">${esc(o.customer_email)}</div>` : ''}
        </div>
        <div class="order-info-box">
          <div class="order-info-label">${esc(t('ord.deliveryBlockTitle'))}</div>
          <div class="order-info-value">${esc(typeLine || '—')}</div>
          ${o.customer_address ? `<div style="font-size:.8rem;color:var(--ink3);margin-top:4px;">${esc(o.customer_address)}</div>` : ''}
          ${sourceDisplayLine ? `<div style="font-size:.8rem;color:var(--ink3)">${esc(t('ord.sourceLabel'))} : ${esc(sourceDisplayLine)}</div>` : ''}
        </div>
        <div class="order-info-box">
          <div class="order-info-label">${esc(t('ord.notes'))}</div>
          <div class="order-info-value" style="font-size:.85rem;color:var(--ink2)">
            ${o.customer_notes ? esc(o.customer_notes) : `<span style="color:var(--ink3)">${esc(t('ord.noNotes'))}</span>`}
          </div>
        </div>
      </div>

      <div class="order-items-table">
        <div class="oi-row header">
          <div>${esc(t('ord.thProduct'))}</div><div style="text-align:center">${esc(t('ord.thQty'))}</div>
          <div style="text-align:right">${esc(t('ord.thUnitPrice'))}</div>
          <div style="text-align:right">${esc(t('ord.thLineSubtotal'))}</div>
        </div>
        ${items.map(i => `
        <div class="oi-row">
          <div>${esc(i.product_name)}</div>
          <div style="text-align:center">${i.quantity}</div>
          <div style="text-align:right">${fmtCurrency(i.unit_price, getRestaurantCurrency(restaurant), loc)}</div>
          <div class="oi-total">${fmtCurrency(i.subtotal, getRestaurantCurrency(restaurant), loc)}</div>
        </div>`).join('')}
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
        <a href="${waLink}" target="_blank" class="order-wa-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          ${esc(t('ord.waContact'))}
        </a>
        <div class="order-total-summary">
          ${o.delivery_fee ? `<span>${esc(t('ord.delivery'))}: ${fmtCurrency(o.delivery_fee, getRestaurantCurrency(restaurant), loc)}</span>` : ''}
          ${o.discount_amount ? `<span style="color:var(--green)">${esc(t('ord.discount'))}: -${fmtCurrency(o.discount_amount, getRestaurantCurrency(restaurant), loc)}</span>` : ''}
          <span>${esc(t('ord.total'))} : <strong>${fmtCurrency(o.total_amount, getRestaurantCurrency(restaurant), loc)}</strong></span>
        </div>
      </div>
    </div>
  </div>`;
}

window.toggleOrder = function(id) {
  const panel = document.getElementById(`detail-${id}`);
  panel.classList.toggle('open');
};

window.filterStatus = function(status, btn) {
  currentStatus = status;
  document.querySelectorAll('.sf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
};

window.handleSearch = function(q) {
  searchQuery = q;
  renderOrders();
};

window.updateStatus = async function(id, status) {
  if (status === 'cancelled' && !confirm(t('ord.confirmCancelOrder'))) return;
  const { error } = await updateOrderStatus(id, status);
  if (error) {
    toast(t('ord.updateErr') + ': ' + error.message, 'error');
    return;
  }
  toast(t('ord.updateOk'), 'success');
  await loadOrders();
};

window.handleSignOut = async () => { await signOut(); };
</script>
</body>
</html>
