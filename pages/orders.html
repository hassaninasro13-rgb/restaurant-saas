<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneTap Menu — Commandes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="../css/shared.css">
<link rel="stylesheet" href="../css/dashboard.css">
<style>
  .orders-toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .status-filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }
  .sf-btn {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    font-size: .8rem;
    font-weight: 600;
    cursor: pointer;
    background: #fff;
    color: var(--ink2);
    transition: all .12s;
  }
  .sf-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .sf-btn:hover:not(.active) { border-color: var(--ink); }

  .orders-search {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 14px;
    min-width: 220px;
  }
  .orders-search input {
    border: none;
    outline: none;
    font-size: .88rem;
    color: var(--ink);
    background: transparent;
    width: 100%;
  }
  .orders-search input::placeholder { color: var(--ink3); }

  /* Order cards */
  .order-card-full {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 10px;
    transition: box-shadow .12s;
  }
  .order-card-full:hover { box-shadow: var(--shadow); }

  .order-card-header {
    display: grid;
    grid-template-columns: 130px 1fr 160px 120px 170px;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
  }
  .order-card-header:hover { background: var(--cream); }

  .order-num-tag {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 1rem;
    color: var(--accent);
  }
  .order-date { font-size: .75rem; color: var(--ink3); margin-top: 2px; }
  .order-customer-name { font-weight: 600; font-size: .93rem; }
  .order-customer-phone { font-size: .78rem; color: var(--ink3); }
  .order-total {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1rem;
  }
  .order-type-tag { font-size: .8rem; color: var(--ink3); margin-top: 3px; }

  .order-status-select {
    padding: 7px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: .82rem;
    font-weight: 600;
    cursor: pointer;
    background: #fff;
    outline: none;
    width: 100%;
    transition: border-color .12s;
  }
  .order-status-select:focus { border-color: var(--accent); }

  .order-expand-btn {
    background: var(--cream2);
    border: none;
    border-radius: 6px;
    width: 28px; height: 28px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    transition: all .15s;
    justify-self: end;
  }
  .order-expand-btn:hover { background: var(--cream3); }

  .order-detail-panel {
    border-top: 1.5px solid var(--border);
    padding: 20px 24px;
    display: none;
    background: var(--cream);
  }
  .order-detail-panel.open { display: block; }

  .order-items-table {
    background: #fff;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .oi-row {
    display: grid;
    grid-template-columns: 1fr 80px 80px 90px;
    gap: 8px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: .88rem;
    align-items: center;
  }
  .oi-row:last-child { border-bottom: none; }
  .oi-row.header {
    background: var(--cream2);
    font-size: .72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--ink3);
  }
  .oi-total { font-weight: 700; text-align: right; }

  .order-info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 16px;
  }
  .order-info-box {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
  }
  .order-info-label {
    font-size: .72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--ink3);
    margin-bottom: 4px;
  }
  .order-info-value { font-size: .9rem; font-weight: 500; }

  .order-wa-btn {
    background: #25D366;
    color: #fff;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 16px;
    border-radius: var(--radius);
    font-size: .85rem;
    font-weight: 600;
    text-decoration: none;
    transition: background .15s;
  }
  .order-wa-btn:hover { background: #1EB857; }

  .order-total-summary {
    display: flex;
    gap: 16px;
    align-items: center;
    justify-content: flex-end;
    padding: 12px 16px;
    background: #fff;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    font-size: .9rem;
  }
  .order-total-summary strong { font-family: var(--font-display); font-size: 1.1rem; }

  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    animation: pulse 2s infinite;
    margin-right: 4px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }

  @media (max-width: 900px) {
    .order-card-header { grid-template-columns: 1fr 1fr; }
    .order-info-grid { grid-template-columns: 1fr 1fr; }
    .oi-row { grid-template-columns: 1fr 60px 70px; }
  }
</style>
</head>
<body>

<div id="page-loader">
  <div class="loader-logo">OneTap</div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-name">OneTap</div>
      <div class="sidebar-brand-sub" id="sb-rest-name">Chargement...</div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Principal</div>
      <a href="dashboard.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Aperçu
      </a>
      <a href="orders.html" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
        Commandes
      </a>
      <div class="sidebar-section-label">Menu</div>
      <a href="add-categories.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Catégories
      </a>
      <a href="add-products.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Produits
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-item" onclick="handleSignOut()" style="color:rgba(255,255,255,.4)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Déconnexion
      </button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="topbar-title">
          <span class="live-dot"></span>
          Commandes
        </h1>
      </div>
      <div class="topbar-right">
        <span id="orders-count-tag" style="font-size:.83rem;color:var(--ink3);"></span>
        <button class="btn btn-secondary btn-sm" onclick="loadOrders()">↻ Actualiser</button>
      </div>
    </header>

    <div class="page-content">

      <!-- STATS ROW -->
      <div class="stats-grid" style="grid-template-columns:repeat(5,1fr);margin-bottom:20px;" id="stats-row">
        <div class="stat-card"><div class="stat-card-label">Nouvelles</div><div class="stat-card-value" id="s-new" style="color:var(--blue)">—</div></div>
        <div class="stat-card"><div class="stat-card-label">En préparation</div><div class="stat-card-value" id="s-preparing" style="color:var(--amber)">—</div></div>
        <div class="stat-card"><div class="stat-card-label">Prêtes</div><div class="stat-card-value" id="s-ready" style="color:var(--green)">—</div></div>
        <div class="stat-card"><div class="stat-card-label">Terminées (30j)</div><div class="stat-card-value" id="s-done">—</div></div>
        <div class="stat-card"><div class="stat-card-label">CA (30j)</div><div class="stat-card-value" id="s-revenue" style="color:var(--accent)">—</div></div>
      </div>

      <!-- FILTERS + SEARCH -->
      <div class="orders-toolbar">
        <div class="status-filters" id="status-filters">
          <button class="sf-btn active" onclick="filterStatus('all', this)">Toutes</button>
          <button class="sf-btn" onclick="filterStatus('new', this)">🔵 Nouvelles</button>
          <button class="sf-btn" onclick="filterStatus('confirmed', this)">🟣 Confirmées</button>
          <button class="sf-btn" onclick="filterStatus('preparing', this)">🟡 En préparation</button>
          <button class="sf-btn" onclick="filterStatus('ready', this)">🟢 Prêtes</button>
          <button class="sf-btn" onclick="filterStatus('done', this)">✅ Terminées</button>
          <button class="sf-btn" onclick="filterStatus('cancelled', this)">❌ Annulées</button>
        </div>
        <div class="orders-search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="search-input" placeholder="Nom, téléphone, numéro..." oninput="handleSearch(this.value)">
        </div>
      </div>

      <!-- ORDERS LIST -->
      <div id="orders-container">
        <div class="empty-state"><div class="empty-state-icon" style="font-size:2rem">📋</div><h3>Chargement...</h3></div>
      </div>

    </div>
  </div>
</div>

<script type="module">
import { requireAuth, signOut, syncAuthContext } from '../supabase/auth.js';
import { tryCreateRestaurantFromPending } from '../supabase/restaurants.js';
import { getRestaurant, hideLoader, fmtCurrency, fmtDate, getStatusBadge, toast } from '../js/shared.js';
import { listOrdersWithItems, updateOrderStatus } from '../supabase/orders.js';

let restaurant = null;
let allOrders = [];
let currentStatus = 'all';
let searchQuery = '';
let refreshInterval = null;

(async () => {
  const session = await requireAuth();
  if (!session) return;
  let { data: rest } = await getRestaurant(session.user.id);
  if (!rest && (await tryCreateRestaurantFromPending(session.user.id))) {
    await syncAuthContext(session.user.id);
    ({ data: rest } = await getRestaurant(session.user.id));
  }
  if (!rest) { window.location.href = 'create-restaurant.html'; return; }
  restaurant = rest;
  document.getElementById('sb-rest-name').textContent = rest.name;
  await loadOrders();
  hideLoader();

  // Auto-refresh every 30 seconds
  refreshInterval = setInterval(loadOrders, 30000);
})();

window.loadOrders = async function() {
  const { data } = await listOrdersWithItems(restaurant.id, 200);

  allOrders = data || [];
  updateStats();
  renderOrders();
};

function updateStats() {
  const thirtyDaysAgo = new Date(Date.now() - 30*24*60*60*1000).toISOString();
  const recent = allOrders.filter(o => o.created_at >= thirtyDaysAgo);

  document.getElementById('s-new').textContent = allOrders.filter(o => o.status === 'new').length;
  document.getElementById('s-preparing').textContent = allOrders.filter(o => o.status === 'preparing').length;
  document.getElementById('s-ready').textContent = allOrders.filter(o => o.status === 'ready').length;
  document.getElementById('s-done').textContent = recent.filter(o => o.status === 'done').length;
  const revenue = recent.filter(o => o.status === 'done').reduce((s, o) => s + (o.total_amount || 0), 0);
  document.getElementById('s-revenue').textContent = fmtCurrency(revenue);
}

function getFiltered() {
  let filtered = currentStatus === 'all' ? allOrders : allOrders.filter(o => o.status === currentStatus);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(o =>
      o.customer_name?.toLowerCase().includes(q) ||
      o.customer_phone?.includes(q) ||
      o.order_number?.toLowerCase().includes(q)
    );
  }
  return filtered;
}

function renderOrders() {
  const filtered = getFiltered();
  document.getElementById('orders-count-tag').textContent = `${filtered.length} commande${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('orders-container');
  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon" style="font-size:2rem">📋</div>
        <h3>Aucune commande</h3>
        <p>${currentStatus === 'all' ? 'Partagez votre menu pour recevoir vos premières commandes.' : 'Aucune commande avec ce statut.'}</p>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(o => buildOrderCard(o)).join('');
}

function buildOrderCard(o) {
  const items = o.order_items || [];
  const typeLabels = { delivery: '🛵 Livraison', pickup: '🏪 À emporter', dine_in: '🍽️ Sur place', qr_table: '📱 QR Table' };

  const waMsg = encodeURIComponent(
    `✅ Votre commande ${o.order_number} est confirmée!\nMerci ${o.customer_name} 🙏`
  );
  const waLink = `https://wa.me/${o.customer_phone?.replace(/\D/g,'')}?text=${waMsg}`;

  return `
  <div class="order-card-full" id="order-${o.id}">
    <div class="order-card-header" onclick="toggleOrder('${o.id}')">
      <div>
        <div class="order-num-tag">${o.order_number}</div>
        <div class="order-date">${fmtDate(o.created_at)}</div>
      </div>
      <div>
        <div class="order-customer-name">${o.customer_name}</div>
        <div class="order-customer-phone">${o.customer_phone || '—'}</div>
      </div>
      <div>
        <div class="order-total">${fmtCurrency(o.total_amount)}</div>
        <div class="order-type-tag">${typeLabels[o.order_type] || o.order_type}</div>
      </div>
      <div>${getStatusBadge(o.status)}</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <select class="order-status-select" onchange="updateStatus('${o.id}', this.value)" onclick="event.stopPropagation()">
          ${['new','confirmed','preparing','ready','done','delivered','cancelled'].map(s =>
            `<option value="${s}" ${o.status === s ? 'selected' : ''}>${{
              new:'Nouvelle',confirmed:'Confirmée',preparing:'En préparation',
              ready:'Prête',done:'Terminée',delivered:'Livrée',cancelled:'Annulée'
            }[s]}</option>`
          ).join('')}
        </select>
        <button class="order-expand-btn">▾</button>
      </div>
    </div>

    <div class="order-detail-panel" id="detail-${o.id}">
      <div class="order-info-grid">
        <div class="order-info-box">
          <div class="order-info-label">Client</div>
          <div class="order-info-value">${o.customer_name}</div>
          <div style="font-size:.8rem;color:var(--ink3)">${o.customer_phone || '—'}</div>
          ${o.customer_email ? `<div style="font-size:.8rem;color:var(--ink3)">${o.customer_email}</div>` : ''}
        </div>
        <div class="order-info-box">
          <div class="order-info-label">Livraison / Retrait</div>
          <div class="order-info-value">${typeLabels[o.order_type] || '—'}</div>
          ${o.customer_address ? `<div style="font-size:.8rem;color:var(--ink3);margin-top:4px;">${o.customer_address}</div>` : ''}
          ${o.table_number ? `<div style="font-size:.8rem;color:var(--ink3)">Table: ${o.table_number}</div>` : ''}
        </div>
        <div class="order-info-box">
          <div class="order-info-label">Notes</div>
          <div class="order-info-value" style="font-size:.85rem;color:var(--ink2)">
            ${o.customer_notes || '<span style="color:var(--ink3)">Aucune note</span>'}
          </div>
        </div>
      </div>

      <div class="order-items-table">
        <div class="oi-row header">
          <div>Produit</div><div style="text-align:center">Qté</div>
          <div style="text-align:right">Prix unit.</div>
          <div style="text-align:right">Sous-total</div>
        </div>
        ${items.map(i => `
        <div class="oi-row">
          <div>${i.product_name}</div>
          <div style="text-align:center">${i.quantity}</div>
          <div style="text-align:right">${fmtCurrency(i.unit_price)}</div>
          <div class="oi-total">${fmtCurrency(i.subtotal)}</div>
        </div>`).join('')}
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
        <a href="${waLink}" target="_blank" class="order-wa-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Contacter via WhatsApp
        </a>
        <div class="order-total-summary">
          ${o.delivery_fee ? `<span>Livraison: ${fmtCurrency(o.delivery_fee)}</span>` : ''}
          ${o.discount_amount ? `<span style="color:var(--green)">Remise: -${fmtCurrency(o.discount_amount)}</span>` : ''}
          <span>Total : <strong>${fmtCurrency(o.total_amount)}</strong></span>
        </div>
      </div>
    </div>
  </div>`;
}

window.toggleOrder = function(id) {
  const panel = document.getElementById(`detail-${id}`);
  panel.classList.toggle('open');
};

window.filterStatus = function(status, btn) {
  currentStatus = status;
  document.querySelectorAll('.sf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
};

window.handleSearch = function(q) {
  searchQuery = q;
  renderOrders();
};

window.updateStatus = async function(id, status) {
  const { error } = await updateOrderStatus(id, status);
  if (error) { toast('Erreur: ' + error.message, 'error'); return; }
  const o = allOrders.find(x => x.id === id);
  if (o) o.status = status;
  updateStats();
  toast('Statut mis à jour', 'success');
};

window.handleSignOut = async () => { await signOut(); };
</script>
</body>
</html>
