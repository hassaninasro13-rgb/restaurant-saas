<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="supabase-env.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneTap Menu — Stock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="../css/shared.css">
<link rel="stylesheet" href="../css/dashboard.css">
<style>
  .stock-table-wrap {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .stock-table {
    width: 100%;
    border-collapse: collapse;
    font-size: .9rem;
  }
  .stock-table th {
    text-align: left;
    padding: 12px 16px;
    background: var(--cream2);
    font-size: .72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--ink3);
    border-bottom: 1.5px solid var(--border);
  }
  .stock-table td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .stock-table tr:last-child td { border-bottom: none; }
  .stock-row--low {
    background: rgba(220, 80, 80, .12);
    box-shadow: inset 4px 0 0 var(--red);
  }
  .stock-qty-cell { font-weight: 700; font-family: var(--font-display); }
  .stock-qty-cell.stock-qty--warn { color: var(--red); }
  #stock-modal-add, #stock-modal-qty {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(12,12,12,.45);
    z-index: 120;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #stock-modal-add.open, #stock-modal-qty.open { display: flex; }
  .stock-modal-card {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 22px;
    max-width: 400px;
    width: 100%;
  }
  .stock-modal-card h3 { margin: 0 0 14px; font-size: 1rem; }
  .stock-modal-card .field { margin-bottom: 12px; }
  .stock-modal-card label { display: block; font-size: .78rem; font-weight: 600; margin-bottom: 4px; color: var(--ink2); }
  .stock-modal-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; justify-content: flex-end; }
</style>
</head>
<body>

<div id="page-loader">
  <div class="loader-logo">OneTap</div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-row">
        <a href="dashboard.html" class="sidebar-brand-logo-link" id="staff-sidebar-logo" hidden data-i18n-aria="nav.overview">
          <img id="staff-sidebar-logo-img" alt="" width="44" height="44" decoding="async">
        </a>
        <div class="sidebar-brand-texts">
          <div class="sidebar-brand-name">OneTap</div>
          <div class="sidebar-brand-sub" id="sb-rest-name">…</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label" data-i18n="nav.sectionMain">Principal</div>
      <a href="dashboard.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span data-i18n="nav.overview">Aperçu</span>
      </a>
      <a href="orders.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
        <span data-i18n="nav.orders">Commandes</span>
      </a>
      <a href="kitchen.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 00-5 5v6c0 1.1.9 2 2 2h1v0"/><path d="M19 22v-3"/></svg>
        <span data-i18n="nav.kitchen">Cuisine</span>
      </a>
      <div class="sidebar-section-label" data-i18n="nav.sectionMenu">Menu</div>
      <a href="add-categories.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span data-i18n="nav.categories">Catégories</span>
      </a>
      <a href="add-products.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span data-i18n="nav.products">Produits</span>
      </a>
      <a href="stock.html" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        <span data-i18n="nav.stock">Stock</span>
      </a>
      <a href="order-sources.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <span data-i18n="nav.sources">Sources</span>
      </a>
      <a href="source-qr.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h6v6H3zM15 3h6v6h-6zM3 15h6v6H3z"/><path d="M15 15h2v2h-2zM19 15h2v2h-2zM15 19h6v2h-6z"/></svg>
        <span data-i18n="nav.qrSources">QR sources</span>
      </a>
      <a href="tables.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="4"/><path d="M5 8v10M19 8v10M9 12h6M9 16h6"/></svg>
        <span>الطاولات</span>
      </a>
      <div class="sidebar-section-label" data-i18n="nav.sectionSettings">Paramètres</div>
      <a href="settings.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span data-i18n="nav.settings">Paramètres</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button type="button" class="nav-item" onclick="handleSignOut()" style="color:rgba(255,255,255,.4)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span data-i18n="nav.signOut">Déconnexion</span>
      </button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="topbar-title" data-i18n="stock.title">Stock</h1>
      </div>
      <div class="topbar-right">
        <button type="button" class="btn btn-primary btn-sm" id="btn-open-add" data-i18n="stock.addBtn">+ Ingredient</button>
      </div>
    </header>

    <div class="page-content">
      <div class="stock-table-wrap">
        <table class="stock-table">
          <thead>
            <tr>
              <th data-i18n="stock.colName">Nom</th>
              <th data-i18n="stock.colUnit">Unité</th>
              <th data-i18n="stock.colQty">Quantité</th>
              <th data-i18n="stock.colAlert">Seuil d’alerte</th>
              <th data-i18n="stock.colActions"></th>
            </tr>
          </thead>
          <tbody id="stock-tbody">
            <tr><td colspan="5" style="text-align:center;color:var(--ink3);padding:28px;" data-i18n="stock.loading">…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="stock-modal-add" role="dialog" aria-modal="true">
  <div class="stock-modal-card">
    <h3 data-i18n="stock.modalAddTitle">Nouvelle matière</h3>
    <div class="field">
      <label for="ing-name" data-i18n="stock.labelName">Nom</label>
      <input type="text" id="ing-name" class="input" data-i18n-placeholder="stock.namePlaceholder">
    </div>
    <div class="field">
      <label for="ing-unit" data-i18n="stock.labelUnit">Unité</label>
      <select id="ing-unit" class="input">
        <option value="g" data-i18n="stock.unitG">g</option>
        <option value="ml" data-i18n="stock.unitMl">ml</option>
        <option value="piece" data-i18n="stock.unitPiece">Pièce</option>
      </select>
    </div>
    <div class="field">
      <label for="ing-qty" data-i18n="stock.labelQty">Quantité actuelle</label>
      <input type="number" id="ing-qty" class="input" min="0" step="0.01" value="0">
    </div>
    <div class="field">
      <label for="ing-alert" data-i18n="stock.labelAlert">Seuil d’alerte (ex. 20&nbsp;% du stock)</label>
      <input type="number" id="ing-alert" class="input" min="0" step="0.01" value="0">
    </div>
    <div class="stock-modal-actions">
      <button type="button" class="btn btn-ghost btn-sm" id="btn-add-cancel" data-i18n="stock.cancel">Annuler</button>
      <button type="button" class="btn btn-primary" id="btn-add-save" data-i18n="stock.save">Enregistrer</button>
    </div>
  </div>
</div>

<div id="stock-modal-qty" role="dialog" aria-modal="true">
  <div class="stock-modal-card">
    <h3 data-i18n="stock.modalQtyTitle">Modifier la quantité</h3>
    <input type="hidden" id="edit-ing-id">
    <div class="field">
      <label for="edit-qty" data-i18n="stock.labelQty">Quantité actuelle</label>
      <input type="number" id="edit-qty" class="input" min="0" step="0.01">
    </div>
    <div class="stock-modal-actions">
      <button type="button" class="btn btn-ghost btn-sm" id="btn-qty-cancel" data-i18n="stock.cancel">Annuler</button>
      <button type="button" class="btn btn-primary" id="btn-qty-save" data-i18n="stock.save">Enregistrer</button>
    </div>
  </div>
</div>

<script type="module">
import { requireAuth, signOut, syncAuthContext } from '../supabase/auth.js';
import { getRestaurantById } from '../supabase/restaurants.js';
import {
  hideLoader,
  toast,
  applyStaffShellBranding,
  t,
  getLang,
  setLang,
  render,
} from '../js/shared.js';
import {
  getMyRestaurantAccess,
  getRoleHomePath,
  isRestaurantRoleAllowed,
} from '../supabase/restaurant-users.js';
import { enforceSubscriptionAccess } from '../supabase/subscriptions.js';
import { listIngredients, insertIngredient, updateIngredient } from '../supabase/ingredients.js';

setLang(getLang());

let restaurant = null;
let ingredients = [];

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/"/g, '&quot;');
}

function unitLabel(unit) {
  if (unit === 'ml') return t('stock.unitMl');
  if (unit === 'piece') return t('stock.unitPiece');
  return t('stock.unitG');
}

function isLowStock(row) {
  const q = Number(row.quantity);
  const a = Number(row.alert_quantity);
  if (!(a > 0)) return false;
  return q <= a;
}

function renderTable() {
  const tbody = document.getElementById('stock-tbody');
  if (!tbody) return;
  if (!ingredients.length) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--ink3);padding:28px;">${esc(t('stock.empty'))}</td></tr>`;
    render();
    return;
  }
  tbody.innerHTML = ingredients.map((row) => {
    const low = isLowStock(row);
    const trClass = low ? ' class="stock-row--low"' : '';
    const qtyClass = low ? 'stock-qty-cell stock-qty--warn' : 'stock-qty-cell';
    return `<tr${trClass}>
      <td>${esc(row.name)}</td>
      <td>${esc(unitLabel(row.unit))}</td>
      <td class="${qtyClass}">${esc(String(row.quantity))}</td>
      <td>${esc(String(row.alert_quantity))}</td>
      <td><button type="button" class="btn btn-secondary btn-sm" data-edit-qty="${esc(row.id)}">${esc(t('stock.editQty'))}</button></td>
    </tr>`;
  }).join('');

  tbody.querySelectorAll('[data-edit-qty]').forEach((btn) => {
    btn.addEventListener('click', () => openQtyModal(btn.getAttribute('data-edit-qty')));
  });
  render();
}

async function loadStock() {
  const { data, error } = await listIngredients(restaurant.id);
  if (error) {
    toast(error.message, 'error');
    ingredients = [];
  } else {
    ingredients = data || [];
  }
  renderTable();
}

function openAddModal() {
  document.getElementById('ing-name').value = '';
  document.getElementById('ing-unit').value = 'g';
  document.getElementById('ing-qty').value = '0';
  document.getElementById('ing-alert').value = '0';
  document.getElementById('stock-modal-add').classList.add('open');
  document.getElementById('ing-name').focus();
}

function closeAddModal() {
  document.getElementById('stock-modal-add').classList.remove('open');
}

function openQtyModal(id) {
  const row = ingredients.find((r) => r.id === id);
  if (!row) return;
  document.getElementById('edit-ing-id').value = id;
  document.getElementById('edit-qty').value = String(row.quantity);
  document.getElementById('stock-modal-qty').classList.add('open');
  document.getElementById('edit-qty').focus();
}

function closeQtyModal() {
  document.getElementById('stock-modal-qty').classList.remove('open');
}

document.getElementById('btn-open-add')?.addEventListener('click', openAddModal);
document.getElementById('btn-add-cancel')?.addEventListener('click', closeAddModal);
document.getElementById('btn-qty-cancel')?.addEventListener('click', closeQtyModal);
document.getElementById('stock-modal-add')?.addEventListener('click', (e) => {
  if (e.target.id === 'stock-modal-add') closeAddModal();
});
document.getElementById('stock-modal-qty')?.addEventListener('click', (e) => {
  if (e.target.id === 'stock-modal-qty') closeQtyModal();
});

document.getElementById('btn-add-save')?.addEventListener('click', async () => {
  const name = document.getElementById('ing-name').value.trim();
  if (!name) {
    toast(t('stock.errName'), 'error');
    return;
  }
  const unit = document.getElementById('ing-unit').value;
  const quantity = Math.max(0, Number(document.getElementById('ing-qty').value) || 0);
  const alert_quantity = Math.max(0, Number(document.getElementById('ing-alert').value) || 0);
  const { error } = await insertIngredient({
    restaurant_id: restaurant.id,
    name,
    unit,
    quantity,
    alert_quantity,
  });
  if (error) {
    toast(t('stock.errSave') + ': ' + error.message, 'error');
    return;
  }
  toast(t('stock.savedOk'), 'success');
  closeAddModal();
  await loadStock();
});

document.getElementById('btn-qty-save')?.addEventListener('click', async () => {
  const id = document.getElementById('edit-ing-id').value;
  const quantity = Math.max(0, Number(document.getElementById('edit-qty').value) || 0);
  const { error } = await updateIngredient(id, { quantity });
  if (error) {
    toast(t('stock.errSave') + ': ' + error.message, 'error');
    return;
  }
  toast(t('stock.savedOk'), 'success');
  closeQtyModal();
  await loadStock();
});

(async () => {
  const session = await requireAuth();
  if (!session) return;
  const { data: access } = await getMyRestaurantAccess(session.user);
  if (!access?.restaurant_id) { window.location.href = 'create-restaurant.html'; return; }
  if (!isRestaurantRoleAllowed(access.role, ['owner', 'admin'])) {
    window.location.href = getRoleHomePath(access.role);
    return;
  }
  await syncAuthContext(session.user.id);
  const { data: rest } = await getRestaurantById(access.restaurant_id);
  if (!rest) { window.location.href = 'create-restaurant.html'; return; }
  const enforcement = enforceSubscriptionAccess(rest);
  if (!enforcement.allowed) {
    toast(enforcement.message || 'Subscription expired', 'error');
    window.location.href = 'dashboard.html?sub=expired';
    return;
  }
  restaurant = rest;
  applyStaffShellBranding(rest);
  document.getElementById('sb-rest-name').textContent = rest.name;
  render();
  await loadStock();
  hideLoader();
})();

window.handleSignOut = async () => { await signOut(); };
</script>
</body>
</html>
