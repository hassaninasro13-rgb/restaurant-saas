<style>
  .tables-add-panel {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 22px;
    margin-bottom: 24px;
  }
  .tables-add-panel h3 {
    font-family: var(--font-display);
    font-size: 1rem;
    margin: 0 0 16px;
  }
  .tables-list { display: flex; flex-direction: column; gap: 10px; }
  .table-row-card {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 18px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: center;
  }
  .table-row-name {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1rem;
    color: var(--ink);
  }
  .table-row-meta {
    font-size: .78rem;
    color: var(--ink3);
    margin-top: 4px;
  }
  .table-row-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-end;
  }
  .qr-modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 950;
    padding: 16px;
  }
  .qr-modal-backdrop.open { display: flex; }
  .qr-modal {
    width: min(420px, 100%);
    background: #fff;
    border-radius: var(--radius-lg);
    border: 1.5px solid var(--border);
    box-shadow: var(--shadow-lg);
    padding: 20px;
  }
  .qr-modal h3 {
    margin: 0 0 8px;
    font-family: var(--font-display);
  }
  .qr-modal p {
    margin: 0 0 14px;
    font-size: .84rem;
    color: var(--ink2);
    line-height: 1.45;
    word-break: break-all;
  }
  .qr-box {
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: #fff;
    min-height: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
    padding: 12px;
  }
  .qr-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    flex-wrap: wrap;
  }
</style>

<body>

    <div class="page-content">
      <div class="tables-add-panel">
        <h3>Ajouter une table</h3>
        <div class="field-row" style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;">
          <div class="field" style="flex:2;min-width:200px;">
            <label for="new-table-name">Nom de la table *</label>
            <input type="text" id="new-table-name" class="input" placeholder="Ex: طاولة 1">
          </div>
          <div class="field" style="flex:1;min-width:140px;">
            <label for="new-table-number">Numéro *</label>
            <input type="number" id="new-table-number" class="input" min="1" step="1" placeholder="1">

<div class="qr-modal-backdrop" id="qr-modal-backdrop" aria-hidden="true">
  <div class="qr-modal" onclick="event.stopPropagation()">
    <h3 id="qr-modal-title">QR Code</h3>
    <p id="qr-modal-url"></p>
    <div class="qr-box" id="qr-code-box"></div>
    <div class="qr-actions">
      <button type="button" class="btn btn-secondary btn-sm" id="btn-download-qr">Télécharger PNG</button>
      <button type="button" class="btn btn-ghost btn-sm" id="btn-close-qr">Fermer</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script type="module">
import { requireAuth, signOut, syncAuthContext } from '../supabase/auth.js';
import { tryCreateRestaurantFromPending } from '../supabase/restaurants.js';
import { getRestaurant, hideLoader, toast, applyStaffShellBranding, getLang, setLang } from '../js/shared.js';
import { listTables, insertTable } from '../supabase/tables.js';
import { enforceSubscriptionAccess } from '../supabase/subscriptions.js';

setLang(getLang());

let restaurant = null;
let currentQrTable = null;

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/"/g, '&quot;');
}

function tableUrl(slug, tableNumber) {
  return `https://onetapmenu.online/pages/index.html?slug=${encodeURIComponent(String(slug || '').trim())}&table=${encodeURIComponent(String(tableNumber || '').trim())}`;
}

async function loadTablesList() {
  const { data, error } = await listTables(restaurant.id);
  if (error) {
    toast(error.message, 'error');
    return;
  }
  const list = data || [];
  document.getElementById('tables-count').textContent = list.length ? `(${list.length})` : '';
  const container = document.getElementById('tables-container');
  if (!list.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon" style="font-size:2rem">🪑</div>
        <h3>Aucune table</h3>
        <p>Ajoutez vos tables pour générer leurs QR Codes.</p>
      </div>`;
    return;
  }

  container.innerHTML = list.map((row) => `
    <div class="table-row-card">
      <div>
        <div class="table-row-name">${esc(row.name)}</div>
        <div class="table-row-meta">Table #${esc(row.table_number)}</div>
      </div>
      <div class="table-row-actions">
        <button type="button" class="btn btn-secondary btn-sm" data-qr-id="${esc(row.id)}">عرض QR Code</button>
      </div>
    </div>
  `).join('');
}

function closeQrModal() {
  const bd = document.getElementById('qr-modal-backdrop');
  if (!bd) return;
  bd.classList.remove('open');
  bd.setAttribute('aria-hidden', 'true');
}

function openQrModalForTable(row) {
  currentQrTable = row;
  const url = tableUrl(restaurant.slug, row.table_number);
  const bd = document.getElementById('qr-modal-backdrop');
  const title = document.getElementById('qr-modal-title');
  const urlEl = document.getElementById('qr-modal-url');
  const box = document.getElementById('qr-code-box');
  if (!bd || !title || !urlEl || !box) return;

  title.textContent = `${row.name} — Table #${row.table_number}`;
  urlEl.textContent = url;
  box.innerHTML = '';
  new QRCode(box, {
    text: url,
    width: 220,
    height: 220,
    correctLevel: QRCode.CorrectLevel.M,
  });
  bd.classList.add('open');
  bd.setAttribute('aria-hidden', 'false');
}

function downloadCurrentQrPng() {
  if (!currentQrTable) return;
  const box = document.getElementById('qr-code-box');
  const canvas = box?.querySelector('canvas');
  const img = box?.querySelector('img');
  const link = document.createElement('a');
  link.download = `table-${currentQrTable.table_number}.png`;
  if (canvas) {
    link.href = canvas.toDataURL('image/png');
  } else if (img?.src) {
    link.href = img.src;
  } else {
    toast('QR indisponible', 'warning');
    return;
  }
  link.click();
}

document.getElementById('tables-container')?.addEventListener('click', async (e) => {
  const btn = e.target.closest('[data-qr-id]');
  if (!btn || !restaurant) return;
  const targetId = btn.getAttribute('data-qr-id');
  const { data, error } = await listTables(restaurant.id);
  if (error) {
    toast(error.message, 'error');
    return;
  }
  const row = (data || []).find((x) => x.id === targetId);
  if (!row) return;
  openQrModalForTable(row);
});

document.getElementById('btn-add-table')?.addEventListener('click', async () => {
  const nameInput = document.getElementById('new-table-name');
  const numInput = document.getElementById('new-table-number');
  const name = nameInput?.value?.trim() ?? '';
  const numberValue = Number.parseInt(numInput?.value ?? '', 10);
  if (!name) {
    toast('Nom de table requis', 'error');
    return;
  }
  if (!Number.isFinite(numberValue) || numberValue <= 0) {
    toast('Numéro de table invalide', 'error');
    return;
  }
  const btn = document.getElementById('btn-add-table');
  btn.disabled = true;
  const { error } = await insertTable(restaurant.id, { name, table_number: numberValue });
  btn.disabled = false;
  if (error) {
    toast(error.message || 'Impossible d’ajouter la table', 'error');
    return;
  }
  toast('Table ajoutée', 'success');
  nameInput.value = '';
  numInput.value = '';
  await loadTablesList();
});

document.getElementById('btn-close-qr')?.addEventListener('click', closeQrModal);
document.getElementById('btn-download-qr')?.addEventListener('click', downloadCurrentQrPng);
document.getElementById('qr-modal-backdrop')?.addEventListener('click', (e) => {
  if (e.target?.id === 'qr-modal-backdrop') closeQrModal();
});

(async () => {
  const session = await requireAuth();
  if (!session) return;
  let { data: rest } = await getRestaurant(session.user.id);
  if (!rest && (await tryCreateRestaurantFromPending(session.user.id))) {
    await syncAuthContext(session.user.id);
    ({ data: rest } = await getRestaurant(session.user.id));
  }
  if (!rest) {
    window.location.href = 'create-restaurant.html';
    return;
  }
  const enforcement = enforceSubscriptionAccess(rest);
  if (!enforcement.allowed) {
    toast(enforcement.message || 'Your subscription has expired', 'error');
    window.location.href = 'dashboard.html?sub=expired';
    return;
  }
  if (enforcement.status === 'pending' || enforcement.status === 'canceled') {
    toast(enforcement.message || `Subscription warning: ${enforcement.status}`, 'warning');
  }
  restaurant = rest;
  applyStaffShellBranding(rest);
  document.getElementById('sb-rest-name').textContent = rest.name;
  await loadTablesList();
  hideLoader();
})();

window.handleSignOut = async () => { await signOut(); };
</script>
